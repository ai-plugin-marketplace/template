hooks:
  PostToolUse:
    - matcher: Write
      description: Append one JSON object per evaluation-report write to a JSON Lines log
      hooks:
        - type: command
          command: >-
            if echo "$TOOL_INPUT" | grep -q 'evaluation-report';
            then echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"event\":\"evaluation-report-written\"}"
            >> .evaluation-log.jsonl; fi
